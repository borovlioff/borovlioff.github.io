<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TextMaster — Текстовый инструмент</title>
    <link rel="shortcut icon" href="/assets/fire-syY9ZyRM.png" type="image/png">

     <script>(function (w, d, s, l, i) {w[l] = w[l] || []; w[l].push({ 'gtm.start': new Date().getTime(), event: 'gtm.js' }); var f = d.getElementsByTagName(s)[0], j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src ='https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);})(window, document, 'script', 'dataLayer', 'GTM-PNR2S4H2');</script>

  <script type="module" crossorigin src="/assets/text-tools-BxeW80C3.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/assets/text-tools-DbokXCsR.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col font-sans">

    <!-- Фоновые эффекты -->
    <div class="fixed inset-0 pointer-events-none opacity-10">
        <div class="absolute top-20 left-1/4 w-64 h-64 bg-blue-500 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-20 right-1/4 w-64 h-64 bg-green-500 rounded-full blur-3xl animate-pulse delay-1000"></div>
    </div>

    <!-- Заголовок -->
    <header class="relative z-10 p-5 text-center border-b border-gray-800">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-green-400 bg-clip-text text-transparent">
            TextMaster
        </h1>
        <p class="text-sm text-gray-400">Текстовые инструменты • Редактируйте, форматируйте, конвертируйте</p>
    </header>

    <!-- Основной контент -->
    <main class="flex-1 p-4 md:p-6 max-w-6xl mx-auto w-full flex flex-col lg:flex-row gap-6">

        <!-- Левая панель: текстовое поле -->
        <section class="lg:w-1/2 flex flex-col">
            <label for="textArea" class="block text-sm font-semibold text-blue-400 mb-2">Ваш текст</label>
            <textarea id="textArea"
                      placeholder="Введите или вставьте текст..."
                      class="flex-1 p-4 bg-gray-900/70 border border-gray-700 rounded-xl resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm leading-relaxed font-mono backdrop-blur-sm"></textarea>
            <button id="copyText"
                    class="mt-3 self-start px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-xs rounded-lg transition btn">
                📋 Копировать
            </button>
        </section>

        <!-- Правая панель: инструменты -->
        <aside class="lg:w-1/2 space-y-5">
            <h2 class="text-lg font-semibold text-green-400">Форматирование</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
                <button id="uppercaseText" class="btn px-3 py-2 bg-blue-600 hover:bg-blue-500 text-xs rounded-lg">UPPERCASE</button>
                <button id="lowercaseText" class="btn px-3 py-2 bg-blue-600 hover:bg-blue-500 text-xs rounded-lg">lowercase</button>
                <button id="capitalizeText" class="btn px-3 py-2 bg-blue-600 hover:bg-blue-500 text-xs rounded-lg">Capitalize</button>
                <button id="removeExtraSpaces" class="btn px-3 py-2 bg-gray-700 hover:bg-gray-600 text-xs rounded-lg">Убрать лишние пробелы</button>
                <button id="removeHtmlTags" class="btn px-3 py-2 bg-gray-700 hover:bg-gray-600 text-xs rounded-lg">Удалить теги HTML</button>
                <button id="convertToTranslit" class="btn px-3 py-2 bg-gray-700 hover:bg-gray-600 text-xs rounded-lg">Транслит</button>
            </div>

            <h2 class="text-lg font-semibold text-green-400 mt-6">Сортировка</h2>
            <div class="grid grid-cols-2 gap-2">
                <button id="sortAlphabetically" class="btn px-3 py-2 bg-purple-600 hover:bg-purple-500 text-xs rounded-lg">А → Я</button>
                <button id="sortReverseAlphabetically" class="btn px-3 py-2 bg-purple-600 hover:bg-purple-500 text-xs rounded-lg">Я → А</button>
                <button id="removeDuplicates" class="btn px-3 py-2 bg-purple-600 hover:bg-purple-500 text-xs rounded-lg">Убрать дубли</button>
            </div>

            <h2 class="text-lg font-semibold text-green-400 mt-6">Конвертация</h2>
            <div class="grid grid-cols-2 gap-2">
                <button id="convertToJsonArray" class="btn px-3 py-2 bg-green-600 hover:bg-green-500 text-xs rounded-lg">→ JSON Array</button>
                <button id="convertToJsonObject" class="btn px-3 py-2 bg-green-600 hover:bg-green-500 text-xs rounded-lg">→ JSON Object</button>
                <button id="generateBase64" class="btn px-3 py-2 bg-green-600 hover:bg-green-500 text-xs rounded-lg">→ Base64</button>
                <button id="decodeBase64" class="btn px-3 py-2 bg-green-600 hover:bg-green-500 text-xs rounded-lg">← Base64</button>
                <button id="generateSlug" class="btn px-3 py-2 bg-green-600 hover:bg-green-500 text-xs rounded-lg">→ Slug</button>
            </div>

            <h2 class="text-lg font-semibold text-green-400 mt-6">Замена разделителей</h2>
            <div class="grid grid-cols-2 gap-2">
                <button id="replaceNewLineWithTab" class="btn px-3 py-2 bg-yellow-600 hover:bg-yellow-500 text-xs rounded-lg">\\n → \\t</button>
                <button id="replaceCommaWithTab" class="btn px-3 py-2 bg-yellow-600 hover:bg-yellow-500 text-xs rounded-lg">, → \\t</button>
                <button id="replaceSemicolonWithTab" class="btn px-3 py-2 bg-yellow-600 hover:bg-yellow-500 text-xs rounded-lg">; → \\t</button>
                <button id="cleanPhoneNumbers" class="btn px-3 py-2 bg-red-600 hover:bg-red-500 text-xs rounded-lg">Очистить телефоны</button>
            </div>

            <h2 class="text-lg font-semibold text-green-400 mt-6">Другое</h2>
            <div class="grid grid-cols-2 gap-2">
                <button id="countCharacters" class="btn px-3 py-2 bg-gray-700 hover:bg-gray-600 text-xs rounded-lg">🔢 Считать символы</button>
                <button id="generateQRCode" class="btn px-3 py-2 bg-indigo-600 hover:bg-indigo-500 text-xs rounded-lg">📱 QR-код</button>
            </div>
        </aside>
    </main>

    <!-- Подключение скрипта -->
</body>
</html>
