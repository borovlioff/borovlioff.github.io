      // Schema mutations
      function addSchema() {
        const n = prompt("Имя схемы (напр. User, Product, ErrorResponse):");
        if (!n) return;
        if (S.components.schemas[n]) {
          alert("Схема уже существует");
          return;
        }
        S.components.schemas[n] = {
          type: "object",
          description: "",
          properties: {},
          required: [],
        };
        UI.schema = n;
        render();
      }
      function removeSchema(n) {
        if (!confirm(`Удалить схему "${n}"?`)) return;
        delete S.components.schemas[n];
        if (UI.schema === n) UI.schema = null;
        render();
      }
      function renameSchema(old) {
        const nw = prompt("Новое имя:", old);
        if (!nw || nw === old) return;
        if (S.components.schemas[nw]) {
          alert("Уже существует");
          return;
        }
        S.components.schemas[nw] = S.components.schemas[old];
        delete S.components.schemas[old]; // Update refs
        const oldRef = `#/components/schemas/${old}`,
          newRef = `#/components/schemas/${nw}`;
        const str = JSON.stringify(S).replaceAll(oldRef, newRef);
        Object.assign(S, JSON.parse(str));
        UI.schema = nw;
        render();
      }
      function addSchemaProp(name) {
        const pn = prompt("Имя свойства:");
        if (!pn) return;
        if (!S.components.schemas[name].properties)
          S.components.schemas[name].properties = {};
        S.components.schemas[name].properties[pn] = {
          type: "string",
          description: "",
        };
        render();
      }
      function removeSchemaProp(name, pn) {
        delete S.components.schemas[name].properties[pn];
        const ri = (S.components.schemas[name].required || []).indexOf(pn);
        if (ri >= 0) S.components.schemas[name].required.splice(ri, 1);
        render();
      }
      function setSchemaPropType(name, pn, type) {
        S.components.schemas[name].properties[pn].type = type;
        delete S.components.schemas[name].properties[pn].$ref;
        render();
      }
      function setSchemaPropRef(name, pn, ref) {
        if (ref) {
          S.components.schemas[name].properties[pn] = { $ref: ref };
        } else {
          S.components.schemas[name].properties[pn] = { type: "string" };
        }
        render();
      }
      function togglePropRequired(name, pn, on) {
        if (!S.components.schemas[name].required)
          S.components.schemas[name].required = [];
        const req = S.components.schemas[name].required;
        const i = req.indexOf(pn);
        if (on && i < 0) req.push(pn);
        else if (!on && i >= 0) req.splice(i, 1);
        render();
      }
      function addCompositionItem(name, kw) {
        if (!S.components.schemas[name][kw])
          S.components.schemas[name][kw] = [];
        S.components.schemas[name][kw].push({});
        render();
      }

      // ═══════════════════════════════════════════════════════════
      // GENERATE OPENAPI DOC
      // ═══════════════════════════════════════════════════════════
      function generateDoc() {
        const doc = { openapi: $("oa-ver")?.value || "3.0.3", info: {} };

        // Info
        doc.info.title = S.info.title || "My API";
        doc.info.version = S.info.version || "1.0.0";
        if (S.info.description) doc.info.description = S.info.description;
        if (S.info.termsOfService)
          doc.info.termsOfService = S.info.termsOfService;
        const ct = {};
        if (S.info.contact.name) ct.name = S.info.contact.name;
        if (S.info.contact.email) ct.email = S.info.contact.email;
        if (S.info.contact.url) ct.url = S.info.contact.url;
        if (Object.keys(ct).length) doc.info.contact = ct;
        const lic = {};
        if (S.info.license.name) {
          lic.name = S.info.license.name;
          if (S.info.license.url) lic.url = S.info.license.url;
          doc.info.license = lic;
        }
        if (S.externalDocs.url) {
          doc.externalDocs = { url: S.externalDocs.url };
          if (S.externalDocs.description)
            doc.externalDocs.description = S.externalDocs.description;
        }

        // Servers
        const srvs = S.servers
          .filter((s) => s.url)
          .map((s) => {
            const o = { url: s.url };
            if (s.description) o.description = s.description;
            const vs = s.variables || {};
            const vks = Object.keys(vs).filter((k) => vs[k].default);
            if (vks.length) {
              o.variables = {};
              vks.forEach((k) => {
                o.variables[k] = { default: vs[k].default };
                if (vs[k].description)
                  o.variables[k].description = vs[k].description;
                if (vs[k].enum?.length) o.variables[k].enum = vs[k].enum;
              });
            }
            return o;
          });
        if (srvs.length) doc.servers = srvs;

        // Tags
        const tgs = S.tags
          .filter((t) => t.name)
          .map((t) => {
            const o = { name: t.name };
            if (t.description) o.description = t.description;
            if (t.externalDocs?.url)
              o.externalDocs = { url: t.externalDocs.url };
            return o;
          });
        if (tgs.length) doc.tags = tgs;

        // Security
        if (S.security?.length) doc.security = S.security;

        // Paths
        const pks = Object.keys(S.paths);
        if (pks.length) {
          doc.paths = {};
          pks
            .filter((pk) => pk)
            .forEach((pk) => {
              const pObj = S.paths[pk];
              doc.paths[pk] = {};
              if (pObj.parameters?.length)
                doc.paths[pk].parameters = cleanParams(pObj.parameters);
              METHODS.forEach((m) => {
                if (!pObj[m]) return;
                const op = pObj[m];
                const co = {};
                if (op.tags?.length) co.tags = op.tags;
                if (op.summary) co.summary = op.summary;
                if (op.description) co.description = op.description;
                if (op.operationId) co.operationId = op.operationId;
                if (op.deprecated) co.deprecated = true;
                if (op.externalDocs?.url)
                  co.externalDocs = {
                    url: op.externalDocs.url,
                    description: op.externalDocs.description || undefined,
                  };
                if (op.parameters?.length)
                  co.parameters = cleanParams(op.parameters);
                if (op.requestBody) {
                  const rb = {};
                  if (op.requestBody.description)
                    rb.description = op.requestBody.description;
                  if (op.requestBody.required) rb.required = true;
                  const ct = cleanContent(op.requestBody.content || {});
                  if (Object.keys(ct).length) rb.content = ct;
                  if (Object.keys(rb).length || rb.content) co.requestBody = rb;
                }
                if (op.responses) {
                  co.responses = {};
                  Object.entries(op.responses).forEach(([code, resp]) => {
                    if (!resp) return;
                    const cr = { description: resp.description || "" };
                    const ct = cleanContent(resp.content || {});
                    if (Object.keys(ct).length) cr.content = ct;
                    if (resp.headers && Object.keys(resp.headers).length) {
                      cr.headers = {};
                      Object.entries(resp.headers).forEach(([h, hv]) => {
                        cr.headers[h] = { schema: { type: "string" } };
                        if (hv.description)
                          cr.headers[h].description = hv.description;
                      });
                    }
                    co.responses[code] = cr;
                  });
                }
                if (op.security !== undefined) co.security = op.security;
                doc.paths[pk][m] = co;
              });
            });
        }

        // Components
        const comps = {};
        if (Object.keys(S.components.schemas).length) {
          comps.schemas = {};
          Object.entries(S.components.schemas).forEach(([n, s]) => {
            comps.schemas[n] = cleanSchema(s);
          });
        }
        if (Object.keys(S.components.securitySchemes).length) {
          comps.securitySchemes = {};
          Object.entries(S.components.securitySchemes).forEach(([n, s]) => {
            const cs = { type: s.type };
            if (s.description) cs.description = s.description;
            if (s.type === "apiKey") {
              if (s.name) cs.name = s.name;
              if (s.in) cs.in = s.in;
            } else if (s.type === "http") {
              if (s.scheme) cs.scheme = s.scheme;
              if (s.bearerFormat) cs.bearerFormat = s.bearerFormat;
            } else if (s.type === "oauth2") {
              cs.flows = {};
              Object.entries(s.flows || {}).forEach(([fk, fv]) => {
                const cf = {};
                if (fv.authorizationUrl)
                  cf.authorizationUrl = fv.authorizationUrl;
                if (fv.tokenUrl) cf.tokenUrl = fv.tokenUrl;
                if (fv.refreshUrl) cf.refreshUrl = fv.refreshUrl;
                cf.scopes = fv.scopes || {};
                cs.flows[fk] = cf;
              });
            } else if (s.type === "openIdConnect") {
              if (s.openIdConnectUrl) cs.openIdConnectUrl = s.openIdConnectUrl;
            }
            comps.securitySchemes[n] = cs;
          });
        }
        if (Object.keys(comps).length) doc.components = comps;

        return doc;
      }

      function cleanParams(params) {
        return (params || [])
          .filter((p) => p.name && p.in)
          .map((p) => {
            const cp = { name: p.name, in: p.in };
            if (p.description) cp.description = p.description;
            if (p.required || p.in === "path") cp.required = true;
            if (p.deprecated) cp.deprecated = true;
            if (p.style) cp.style = p.style;
            if (p.explode !== undefined) cp.explode = p.explode;
            if (p.allowEmptyValue) cp.allowEmptyValue = true;
            const sch = {};
            if (p.schema?.type) sch.type = p.schema.type;
            if (p.schema?.format) sch.format = p.schema.format;
            if (p.schema?.enum?.length) sch.enum = p.schema.enum;
            if (p.schema?.default !== undefined && p.schema.default !== "")
              sch.default = p.schema.default;
            if (p.schema?.items) sch.items = p.schema.items;
            if (p.schema?.example !== undefined) sch.example = p.schema.example;
            if (Object.keys(sch).length) cp.schema = sch;
            if (p.example !== undefined && p.example !== "")
              cp.example = p.example;
            return cp;
          });
      }

      function cleanContent(content) {
        const res = {};
        Object.entries(content || {}).forEach(([ct, ctv]) => {
          res[ct] = {};
          if (ctv.schema) {
            if (ctv.schema.$ref) res[ct].schema = { $ref: ctv.schema.$ref };
            else {
              const s = cleanSchema(ctv.schema);
              if (Object.keys(s).length) res[ct].schema = s;
            }
          }
          if (ctv.example !== undefined && ctv.example !== "")
            res[ct].example = ctv.example;
        });
        return res;
      }

      function cleanSchema(sc) {
        if (!sc) return {};
        if (sc.$ref) return { $ref: sc.$ref };
        const r = {};
        if (sc.type) r.type = sc.type;
        if (sc.format) r.format = sc.format;
        if (sc.description) r.description = sc.description;
        if (sc.nullable) r.nullable = true;
        if (sc.readOnly) r.readOnly = true;
        if (sc.writeOnly) r.writeOnly = true;
        if (sc.deprecated) r.deprecated = true;
        if (sc.example !== undefined && sc.example !== "")
          r.example = sc.example;
        if (sc.properties && Object.keys(sc.properties).length) {
          r.properties = {};
          Object.entries(sc.properties).forEach(([k, v]) => {
            r.properties[k] = cleanSchema(v);
          });
        }
        if (sc.required?.length) r.required = sc.required;
        if (sc.additionalProperties !== undefined)
          r.additionalProperties = sc.additionalProperties;
        if (sc.minProperties !== undefined) r.minProperties = sc.minProperties;
        if (sc.maxProperties !== undefined) r.maxProperties = sc.maxProperties;
        if (sc.items) r.items = cleanSchema(sc.items);
        if (sc.minItems !== undefined) r.minItems = sc.minItems;
        if (sc.maxItems !== undefined) r.maxItems = sc.maxItems;
        if (sc.uniqueItems) r.uniqueItems = true;
        if (sc.minLength !== undefined) r.minLength = sc.minLength;
        if (sc.maxLength !== undefined) r.maxLength = sc.maxLength;
        if (sc.pattern) r.pattern = sc.pattern;
        if (sc.enum?.length) r.enum = sc.enum;
        if (sc.minimum !== undefined) r.minimum = sc.minimum;
        if (sc.maximum !== undefined) r.maximum = sc.maximum;
        if (sc.exclusiveMinimum) r.exclusiveMinimum = true;
        if (sc.exclusiveMaximum) r.exclusiveMaximum = true;
        if (sc.multipleOf !== undefined) r.multipleOf = sc.multipleOf;
        ["allOf", "oneOf", "anyOf"].forEach((kw) => {
          if (sc[kw]?.length) {
            const items = sc[kw].filter((x) => x.$ref);
            if (items.length) r[kw] = items;
          }
        });
        return r;
      }

      // ═══════════════════════════════════════════════════════════
      // PREVIEW
      // ═══════════════════════════════════════════════════════════
      function updatePreview() {
        const el = $("preview-code");
        if (!el) return;
        try {
          const doc = generateDoc();
          let text;
          if (UI.fmt === "yaml")
            text = jsyaml.dump(doc, { indent: 2, lineWidth: -1, noRefs: true });
          else text = JSON.stringify(doc, null, 2);
          el.innerHTML = syntaxHL(text, UI.fmt);
        } catch (e) {
          el.textContent = "Ошибка: " + e.message;
        }
      }

      function syntaxHL(code, fmt) {
        if (fmt === "json") {
          return code.replace(
            /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            (m) => {
              if (/^"/.test(m)) {
                if (/:$/.test(m))
                  return `<span style="color:#93c5fd">${m}</span>`;
                return `<span style="color:#86efac">${m}</span>`;
              }
              if (/true|false/.test(m))
                return `<span style="color:#f472b6">${m}</span>`;
              if (/null/.test(m))
                return `<span style="color:#64748b">${m}</span>`;
              return `<span style="color:#fbbf24">${m}</span>`;
            }
          );
        }
        return code
          .replace(
            /^(\s*)([\w-]+)(:)/gm,
            (_, sp, k, col) =>
              `${sp}<span style="color:#93c5fd">${k}</span>${col}`
          )
          .replace(/(:\s*)(.+)$/gm, (m, pre, val) => {
            if (
              val.startsWith('"') ||
              val.startsWith("'") ||
              /^[a-zA-Z][a-zA-Z0-9_-]*$/.test(val.trim())
            )
              return pre + `<span style="color:#86efac">${val}</span>`;
            if (
              /^\d/.test(val.trim()) ||
              val.trim() === "true" ||
              val.trim() === "false"
            )
              return pre + `<span style="color:#fbbf24">${val}</span>`;
            return m;
          });
      }

      function setFmt(f) {
        UI.fmt = f;
        $("fmt-json").style.cssText =
          f === "json"
            ? "background:#0c2048;color:#60a5fa;border:1px solid #1d4ed8"
            : "background:#1e293b;color:#475569;border:1px solid #334155";
        $("fmt-yaml").style.cssText =
          f === "yaml"
            ? "background:#0c2048;color:#60a5fa;border:1px solid #1d4ed8"
            : "background:#1e293b;color:#475569;border:1px solid #334155";
        updatePreview();
      }

      function copyPreview() {
        navigator.clipboard
          .writeText($("preview-code").textContent)
          .then(() => showToast("Скопировано!"));
      }
      function togglePreviewPanel() {
        $("preview").classList.toggle("mob-show");
      }

      // ═══════════════════════════════════════════════════════════
      // IMPORT / EXPORT
      // ═══════════════════════════════════════════════════════════
      function copyAs(fmt) {
        const doc = generateDoc();
        const text =
          fmt === "yaml"
            ? jsyaml.dump(doc, { indent: 2, lineWidth: -1, noRefs: true })
            : JSON.stringify(doc, null, 2);
        navigator.clipboard
          .writeText(text)
          .then(() => showToast(`${fmt.toUpperCase()} скопирован!`));
      }
      function doDownload() {
        const doc = generateDoc();
        const blob = new Blob([JSON.stringify(doc, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download =
          (S.info.title || "openapi")
            .replace(/[^a-z0-9]/gi, "_")
            .toLowerCase() + ".json";
        a.click();
        URL.revokeObjectURL(url);
        showToast("Файл скачан!");
      }
      function doImport() {
        $("file-inp").click();
      }
      function handleImport(e) {
        const f = e.target.files[0];
        if (!f) return;
        const rd = new FileReader();
        rd.onload = (ev) => {
          try {
            const doc = f.name.match(/\.ya?ml$/i)
              ? jsyaml.load(ev.target.result)
              : JSON.parse(ev.target.result);
            importDoc(doc);
          } catch (err) {
            alert("Ошибка парсинга: " + err.message);
          }
        };
        rd.readAsText(f);
        e.target.value = "";
      }
      function importDoc(doc) {
        if (doc.info) {
          S.info.title = doc.info.title || "";
          S.info.version = doc.info.version || "1.0.0";
          S.info.description = doc.info.description || "";
          S.info.termsOfService = doc.info.termsOfService || "";
          if (doc.info.contact) {
            S.info.contact.name = doc.info.contact.name || "";
            S.info.contact.email = doc.info.contact.email || "";
            S.info.contact.url = doc.info.contact.url || "";
          }
          if (doc.info.license) {
            S.info.license.name = doc.info.license.name || "";
            S.info.license.url = doc.info.license.url || "";
          }
        }
        if (doc.externalDocs) {
          S.externalDocs.url = doc.externalDocs.url || "";
          S.externalDocs.description = doc.externalDocs.description || "";
        }
        S.servers = (doc.servers || []).map((s) => ({
          url: s.url || "",
          description: s.description || "",
          variables: s.variables || {},
        }));
        S.tags = (doc.tags || []).map((t) => ({
          name: t.name || "",
          description: t.description || "",
          externalDocs: t.externalDocs || {},
        }));
        S.paths = doc.paths || {};
        S.security = doc.security || [];
        if (doc.components) {
          S.components.schemas = doc.components.schemas || {};
          S.components.securitySchemes = doc.components.securitySchemes || {};
          S.components.responses = doc.components.responses || {};
          S.components.parameters = doc.components.parameters || {};
        }
        UI.path = null;
        UI.method = null;
        UI.schema = null;
        UI.secScheme = null;
        renderNav();
        renderStats();
        render();
        showToast("Импорт успешен!");
      }
      function doNew() {
        if (!confirm("Создать новый API? Текущие данные будут удалены."))
          return;
        S = {
          info: {
            title: "My API",
            description: "",
            version: "1.0.0",
            termsOfService: "",
            contact: { name: "", email: "", url: "" },
            license: { name: "", url: "" },
          },
          externalDocs: { url: "", description: "" },
          servers: [
            { url: "https://api.example.com/v1", description: "Production" },
          ],
          tags: [],
          paths: {},
          components: {
            schemas: {},
            securitySchemes: {},
            responses: {},
            parameters: {},
          },
          security: [],
        };
        UI.path = null;
        UI.method = null;
        UI.schema = null;
        UI.secScheme = null;
        UI.acc = {};
        renderNav();
        renderStats();
        render();
        showToast("Новый API создан");
      }

      // ═══════════════════════════════════════════════════════════
      // INIT
      // ═══════════════════════════════════════════════════════════
      renderNav();
      renderStats();
      render();
    </script>
  </body>
</html>
