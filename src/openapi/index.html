<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAPI Visual Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      .field {
        background: #0a1628;
        border: 1px solid #1e293b;
        color: #e2e8f0;
        border-radius: 6px;
        padding: 8px 12px;
        width: 100%;
        transition: all 0.15s;
        font-size: 13px;
        font-family: inherit;
      }
      .field:focus {
        border-color: #3b82f6;
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
        background: #0c1a32;
      }
      .field::placeholder {
        color: #3d5068;
      }
      select.field {
        cursor: pointer;
      }
      select.field option {
        background: #0a1628;
      }
      textarea.field {
        resize: vertical;
      }
      .field-mono {
        font-family: "Menlo", "Monaco", "Courier New", monospace;
        font-size: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid transparent;
        user-select: none;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: #1d4ed8;
        color: #fff;
        border-color: #2563eb;
      }
      .btn-primary:hover {
        background: #2563eb;
      }
      .btn-secondary {
        background: #1e293b;
        color: #94a3b8;
        border-color: #334155;
      }
      .btn-secondary:hover {
        background: #334155;
        color: #e2e8f0;
      }
      .btn-danger {
        background: #1c0707;
        color: #f87171;
        border-color: #7f1d1d;
      }
      .btn-danger:hover {
        background: #7f1d1d;
        color: #fecaca;
      }
      .btn-ghost {
        background: transparent;
        color: #64748b;
        border: none;
        padding: 5px 8px;
      }
      .btn-ghost:hover {
        color: #e2e8f0;
        background: #1e293b;
      }
      .btn-sm {
        padding: 4px 10px;
        font-size: 12px;
      }
      .btn-xs {
        padding: 2px 7px;
        font-size: 11px;
      }

      .badge-GET {
        background: #042010;
        color: #4ade80;
        border: 1px solid #155724;
      }
      .badge-POST {
        background: #07152f;
        color: #60a5fa;
        border: 1px solid #1a3a6e;
      }
      .badge-PUT {
        background: #1e1000;
        color: #fb923c;
        border: 1px solid #7c3500;
      }
      .badge-DELETE {
        background: #1a0202;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }
      .badge-PATCH {
        background: #120626;
        color: #c084fc;
        border: 1px solid #5b21b6;
      }
      .badge-HEAD {
        background: #001520;
        color: #38bdf8;
        border: 1px solid #024d70;
      }
      .badge-OPTIONS {
        background: #07071e;
        color: #a5b4fc;
        border: 1px solid #3730a3;
      }

      .method-tab {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        border: 1px solid #1e293b;
        background: #0a1628;
        color: #475569;
        transition: all 0.15s;
      }
      .method-tab:hover {
        background: #1e293b;
        color: #94a3b8;
      }
      .tab-active-GET {
        background: #042010 !important;
        color: #4ade80 !important;
        border-color: #155724 !important;
      }
      .tab-active-POST {
        background: #07152f !important;
        color: #60a5fa !important;
        border-color: #1a3a6e !important;
      }
      .tab-active-PUT {
        background: #1e1000 !important;
        color: #fb923c !important;
        border-color: #7c3500 !important;
      }
      .tab-active-DELETE {
        background: #1a0202 !important;
        color: #f87171 !important;
        border-color: #7f1d1d !important;
      }
      .tab-active-PATCH {
        background: #120626 !important;
        color: #c084fc !important;
        border-color: #5b21b6 !important;
      }
      .tab-active-HEAD {
        background: #001520 !important;
        color: #38bdf8 !important;
        border-color: #024d70 !important;
      }
      .tab-active-OPTIONS {
        background: #07071e !important;
        color: #a5b4fc !important;
        border-color: #3730a3 !important;
      }

      .tip {
        position: relative;
        display: inline-flex;
        cursor: help;
      }
      .tip-icon {
        width: 15px;
        height: 15px;
        background: #0c2448;
        color: #60a5fa;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 800;
        flex-shrink: 0;
        border: 1px solid #1d4ed8;
        line-height: 1;
      }
      .tip:hover .tip-box {
        display: block;
      }
      .tip-box {
        display: none;
        position: absolute;
        bottom: calc(100% + 6px);
        left: 0;
        background: #0a1628;
        color: #cbd5e1;
        border: 1px solid #334155;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 11px;
        line-height: 1.6;
        width: 260px;
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        font-weight: 400;
      }
      .tip-box::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 10px;
        border: 5px solid transparent;
        border-top-color: #334155;
      }

      .lbl {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #7c8fa8;
        font-size: 11px;
        font-weight: 600;
        margin-bottom: 5px;
        letter-spacing: 0.02em;
      }
      .req {
        color: #f87171;
        font-size: 13px;
        line-height: 1;
      }
      .hint {
        font-size: 11px;
        color: #3d5068;
        margin-top: 3px;
        line-height: 1.5;
      }

      .card {
        background: #091220;
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 18px;
      }
      .card-dark {
        background: #060d18;
        border: 1px solid #1a2640;
        border-radius: 8px;
        padding: 14px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 9px 12px;
        border-radius: 8px;
        cursor: pointer;
        color: #5a7090;
        transition: all 0.15s;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 2px;
        white-space: nowrap;
      }
      .nav-item:hover {
        background: #0f1e30;
        color: #94a3b8;
      }
      .nav-item.active {
        background: #0c2048;
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.2);
      }
      .nav-item .badge-count {
        margin-left: auto;
        background: #1e293b;
        color: #475569;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 10px;
        font-weight: 600;
      }

      .path-item {
        display: flex;
        align-items: flex-start;
        gap: 7px;
        padding: 9px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s;
        border: 1px solid transparent;
        margin-bottom: 3px;
      }
      .path-item:hover {
        background: #091220;
        border-color: #1e293b;
      }
      .path-item.active {
        background: #08182e;
        border-color: #1d4ed8;
      }

      .accordion {
        border: 1px solid #1e293b;
        border-radius: 8px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .accordion-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 15px;
        cursor: pointer;
        background: #091220;
        transition: background 0.15s;
        user-select: none;
      }
      .accordion-hdr:hover {
        background: #0f1e30;
      }
      .accordion-body {
        border-top: 1px solid #1e293b;
        padding: 16px;
        background: #05101d;
      }
      .acc-arrow {
        transition: transform 0.2s;
        flex-shrink: 0;
      }
      .acc-open .acc-arrow {
        transform: rotate(90deg);
      }

      .st-2xx {
        background: #042010;
        color: #4ade80;
        border: 1px solid #155724;
      }
      .st-3xx {
        background: #0e1a00;
        color: #a3e635;
        border: 1px solid #3a5c00;
      }
      .st-4xx {
        background: #1e0e00;
        color: #fb923c;
        border: 1px solid #7c3500;
      }
      .st-5xx {
        background: #1a0202;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }
      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 700;
        font-family: "Menlo", monospace;
      }

      .tag-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 9px;
        background: #1e293b;
        color: #64748b;
        border-radius: 100px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid #334155;
        transition: all 0.15s;
        user-select: none;
      }
      .tag-chip:hover {
        border-color: #3b82f6;
        color: #93c5fd;
      }
      .tag-chip.on {
        background: #0c2048;
        color: #60a5fa;
        border-color: #1d4ed8;
      }

      .fade-in {
        animation: fadeIn 0.15s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .prop-row {
        background: #050e1b;
        border: 1px solid #1a2640;
        border-radius: 7px;
        padding: 10px;
      }
      .prop-row:hover {
        border-color: #283d5c;
      }
      .prop-row.req-prop {
        border-color: #1a3a6e;
      }

      @media (max-width: 768px) {
        #sidebar {
          width: 52px !important;
          overflow: hidden;
        }
        #sidebar .nav-label {
          display: none;
        }
        #sidebar .nav-item {
          justify-content: center;
          padding: 10px;
        }
        #sidebar .badge-count {
          display: none;
        }
        #preview {
          display: none;
        }
        #preview.mob-show {
          display: flex;
          position: fixed;
          inset: 0;
          z-index: 50;
          flex-direction: column;
        }
      }
      @media (max-width: 640px) {
        #main-content {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body
    class="h-screen flex flex-col overflow-hidden text-sm"
    style="background: #030c18; color: #cbd5e1"
  >
    <!-- TOAST -->
    <div
      id="toast"
      class="fixed top-4 right-4 z-50 opacity-0 transition-all duration-300 pointer-events-none"
      style="transform: translateY(-8px)"
    >
      <div
        class="flex items-center gap-2 px-4 py-2.5 rounded-lg shadow-2xl"
        style="background: #042010; border: 1px solid #155724; color: #4ade80"
      >
        <svg
          class="w-4 h-4"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 13l4 4L19 7"
          />
        </svg>
        <span id="toast-msg" class="text-sm font-medium"></span>
      </div>
    </div>

    <!-- HEADER -->
    <header
      class="flex items-center justify-between px-4 py-2.5 flex-shrink-0"
      style="background: #060e1c; border-bottom: 1px solid #1a2640"
    >
      <div class="flex items-center gap-3">
        <div class="flex items-center gap-2 select-none">
          <div
            class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0"
            style="background: linear-gradient(135deg, #1d4ed8, #7c3aed)"
          >
            <svg
              class="w-4 h-4 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
              />
            </svg>
          </div>
          <span class="font-bold text-white text-sm hidden sm:block"
            >OpenAPI</span
          >
          <span class="text-slate-600 hidden sm:block">Editor</span>
        </div>
        <div
          class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-lg"
          style="background: #0a1628; border: 1px solid #1e293b"
        >
          <span class="text-xs" style="color: #3d5068">spec</span>
          <select
            id="oa-ver"
            onchange="updatePreview()"
            class="text-xs font-mono text-blue-400 bg-transparent border-none outline-none cursor-pointer"
            style="padding: 0"
          >
            <option value="3.0.3">3.0.3</option>
            <option value="3.1.0">3.1.0</option>
            <option value="3.0.0">3.0.0</option>
          </select>
        </div>
      </div>
      <div class="flex items-center gap-1.5">
        <button
          onclick="doImport()"
          class="btn btn-secondary btn-sm hidden sm:inline-flex"
          title="Импорт JSON/YAML"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
            />
          </svg>
          Импорт
        </button>
        <button
          onclick="doNew()"
          class="btn btn-secondary btn-sm hidden sm:inline-flex"
          title="Новый API"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 4v16m8-8H4"
            />
          </svg>
          Новый
        </button>
        <button
          onclick="copyAs('json')"
          class="btn btn-secondary btn-sm"
          title="Копировать JSON"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
            />
          </svg>
          JSON
        </button>
        <button
          onclick="copyAs('yaml')"
          class="btn btn-secondary btn-sm"
          title="Копировать YAML"
        >
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
            />
          </svg>
          YAML
        </button>
        <button onclick="doDownload()" class="btn btn-primary btn-sm">
          <svg
            class="w-3.5 h-3.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
            />
          </svg>
          <span class="hidden sm:inline">Скачать</span>
        </button>
        <button
          onclick="togglePreviewPanel()"
          class="btn btn-ghost lg:hidden"
          title="Preview"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
            />
          </svg>
        </button>
      </div>
    </header>

    <!-- LAYOUT -->
    <div class="flex flex-1 overflow-hidden">
      <!-- SIDEBAR -->
      <nav
        id="sidebar"
        class="flex-shrink-0 flex flex-col py-3 overflow-y-auto transition-all"
        style="
          width: 210px;
          background: #060e1c;
          border-right: 1px solid #1a2640;
        "
      >
        <div class="px-3">
          <p
            class="text-xs font-semibold uppercase tracking-widest px-3 mb-2"
            style="color: #1e3a5f"
          >
            Структура
          </p>
          <div id="nav-menu"></div>
        </div>
        <div class="mt-auto px-3">
          <div
            id="api-stats"
            class="px-3 py-2 text-xs space-y-0.5"
            style="color: #2a4a6e"
          ></div>
        </div>
      </nav>

      <!-- MAIN -->
      <main
        id="main-content"
        class="flex-1 overflow-y-auto"
        style="background: #040b15"
      ></main>

      <!-- PREVIEW -->
      <aside
        id="preview"
        class="flex-shrink-0 hidden lg:flex flex-col"
        style="
          width: 360px;
          background: #060e1c;
          border-left: 1px solid #1a2640;
        "
      >
        <div
          class="flex items-center justify-between px-4 py-2.5 flex-shrink-0"
          style="border-bottom: 1px solid #1a2640"
        >
          <span class="text-xs font-semibold" style="color: #3d6080"
            >PREVIEW</span
          >
          <div class="flex items-center gap-1.5">
            <button
              id="fmt-json"
              onclick="setFmt('json')"
              class="px-2.5 py-1 rounded text-xs font-semibold transition-all"
              style="
                background: #0c2048;
                color: #60a5fa;
                border: 1px solid #1d4ed8;
              "
            >
              JSON
            </button>
            <button
              id="fmt-yaml"
              onclick="setFmt('yaml')"
              class="px-2.5 py-1 rounded text-xs font-semibold transition-all"
              style="
                background: #1e293b;
                color: #475569;
                border: 1px solid #334155;
              "
            >
              YAML
            </button>
            <button
              onclick="copyPreview()"
              class="btn btn-ghost btn-sm"
              title="Копировать"
            >
              <svg
                class="w-3.5 h-3.5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"
                />
              </svg>
            </button>
          </div>
        </div>
        <pre
          id="preview-code"
          class="flex-1 overflow-auto p-4 leading-relaxed"
          style="
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 11.5px;
            background: #030c18;
            color: #546e8a;
          "
        ></pre>
      </aside>
    </div>

    <input
      type="file"
      id="file-inp"
      accept=".json,.yaml,.yml"
      class="hidden"
      onchange="handleImport(event)"
    />

    <script>
      // ═══════════════════════════════════════════════════════════
      // STATE
      // ═══════════════════════════════════════════════════════════
      let S = {
        info: {
          title: "My API",
          description: "",
          version: "1.0.0",
          termsOfService: "",
          contact: { name: "", email: "", url: "" },
          license: { name: "", url: "" },
        },
        externalDocs: { url: "", description: "" },
        servers: [
          { url: "https://api.example.com/v1", description: "Production" },
        ],
        tags: [],
        paths: {},
        components: {
          schemas: {},
          securitySchemes: {},
          responses: {},
          parameters: {},
        },
        security: [],
      };

      let UI = {
        sec: "info",
        path: null,
        method: null,
        schema: null,
        secScheme: null,
        fmt: "json",
        acc: {},
        expandedPath: {},
        selectedPaths: new Set(),
      };

      const METHODS = [
        "get",
        "post",
        "put",
        "delete",
        "patch",
        "head",
        "options",
      ];
      const HTTP_STATUS = {
        200: "OK",
        201: "Created",
        202: "Accepted",
        204: "No Content",
        301: "Moved Permanently",
        302: "Found",
        304: "Not Modified",
        400: "Bad Request",
        401: "Unauthorized",
        403: "Forbidden",
        404: "Not Found",
        405: "Method Not Allowed",
        409: "Conflict",
        410: "Gone",
        422: "Unprocessable Entity",
        429: "Too Many Requests",
        500: "Internal Server Error",
        502: "Bad Gateway",
        503: "Service Unavailable",
        504: "Gateway Timeout",
        default: "Default",
      };
      const CONTENT_TYPES = [
        "application/json",
        "application/xml",
        "application/x-www-form-urlencoded",
        "multipart/form-data",
        "text/plain",
        "text/html",
        "application/octet-stream",
        "application/pdf",
        "image/png",
        "image/jpeg",
        "application/zip",
      ];
      const SCHEMA_TYPES = [
        "string",
        "number",
        "integer",
        "boolean",
        "object",
        "array",
      ];
      const STRING_FORMATS = [
        "",
        "date",
        "date-time",
        "email",
        "uuid",
        "uri",
        "hostname",
        "ipv4",
        "ipv6",
        "password",
        "byte",
        "binary",
      ];
      const NUM_FORMATS = ["", "int32", "int64", "float", "double"];

      // ═══════════════════════════════════════════════════════════
      // HELPERS
      // ═══════════════════════════════════════════════════════════

      function keepOnlyPath(enc) {
        const p = decodeURIComponent(enc);
        if (!S.paths[p]) return;
        if (
          !confirm(
            `Оставить только "${p}"? Остальные пути и неиспользуемые схемы будут удалены.`
          )
        )
          return;

        S.paths = { [p]: S.paths[p] };
        const used = findUsedSchemas();

        Object.keys(S.components.schemas).forEach((n) => {
          if (!used.has(n)) delete S.components.schemas[n];
        });

        if (UI.schema && !S.components.schemas[UI.schema]) UI.schema = null;
        UI.path = p;
        UI.method = null;
        render();
      }

      function cleanupUnusedSchemas() {
        const used = new Set();
        const walk = (o) => {
          if (!o || typeof o !== "object") return;
          if (o.$ref) {
            const m = o.$ref.match(/#\/components\/schemas\/(.+)$/);
            if (m) used.add(m[1]);
          }
          Array.isArray(o) ? o.forEach(walk) : Object.values(o).forEach(walk);
        };
        walk(S.paths);
        Object.keys(S.components.schemas).forEach((n) => {
          if (!used.has(n)) delete S.components.schemas[n];
        });
        if (UI.schema && !S.components.schemas[UI.schema]) UI.schema = null;
      }

      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        typeof s === "string"
          ? s
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;")
              .replace(/'/g, "&#39;")
          : s ?? "";
      const tip = (t, pos = "left") =>
        `<span class="tip"><span class="tip-icon">?</span><span class="tip-box" style="${
          pos === "right" ? "left:auto;right:0" : "left:0"
        }">${t}</span></span>`;
      const lbl = (text, req, tipText = "", tipPos = "left") =>
        `<div class="lbl">${text}${req ? '<span class="req">*</span>' : ""}${
          tipText ? tip(tipText, tipPos) : ""
        }</div>`;
      const hint = (t) => (t ? `<div class="hint">${t}</div>` : "");
      const fld = (label, req, inputHtml, hintText = "", tipText = "") =>
        `<div class="mb-4">${lbl(
          label,
          req,
          tipText
        )}<div>${inputHtml}</div>${hint(hintText)}</div>`;

      function inp(val = "", placeholder = "", dataPath = "", type = "text") {
        return `<input type="${esc(type)}" class="field" value="${esc(
          val
        )}" placeholder="${esc(placeholder)}" data-p="${esc(
          dataPath
        )}" oninput="fp(this)">`;
      }
      function ta(val = "", placeholder = "", dataPath = "", rows = 3) {
        return `<textarea rows="${rows}" class="field" placeholder="${esc(
          placeholder
        )}" data-p="${esc(dataPath)}" oninput="fp(this)">${esc(
          val
        )}</textarea>`;
      }
      function sel(opts, current, dataPath, onChange = "") {
        const handler = onChange
          ? `onchange="${onChange}"`
          : `onchange="fp(this)"`;
        return `<select class="field" data-p="${esc(dataPath)}" ${handler}>
    ${opts
      .map((o) => {
        const [v, l] = Array.isArray(o) ? o : [o, o];
        return `<option value="${esc(v)}" ${
          current === v ? "selected" : ""
        }>${esc(l)}</option>`;
      })
      .join("")}
  </select>`;
      }
      function numInp(
        val,
        placeholder,
        dataPath,
        min = "",
        max = "",
        step = "1"
      ) {
        return `<input type="number" class="field" value="${
          val ?? ""
        }" placeholder="${placeholder}" data-p="${esc(
          dataPath
        )}" min="${min}" max="${max}" step="${step}" oninput="fp(this)">`;
      }
      function chk(checked, label, onChange, tipText = "") {
        return `<label class="flex items-center gap-2 cursor-pointer select-none mt-1">
    <input type="checkbox" class="w-3.5 h-3.5 cursor-pointer" ${
      checked ? "checked" : ""
    } onchange="${onChange}">
    <span class="text-xs" style="color:#7c8fa8">${label}</span>
    ${tipText ? tip(tipText) : ""}
  </label>`;
      }

      function getNestedPath(obj, path) {
        return path
          .split(".")
          .reduce((o, k) => (o && o[k] !== undefined ? o[k] : ""), obj);
      }
      function setNestedPath(obj, path, val) {
        const ks = path.split(".");
        let o = obj;
        for (let i = 0; i < ks.length - 1; i++) {
          if (!o[ks[i]]) o[ks[i]] = {};
          o = o[ks[i]];
        }
        if (val === "" || val === undefined) {
          // keep empty strings for text fields
          o[ks[ks.length - 1]] = val;
        } else {
          o[ks[ks.length - 1]] = val;
        }
      }

      // field-path update
      function fp(el) {
        const p = el.dataset.p;
        if (!p) return;
        const v = el.type === "checkbox" ? el.checked : el.value;
        setNestedPath(S, p, v);
        updatePreview();
        renderStats();
      }

      function showToast(msg) {
        const t = $("toast"),
          m = $("toast-msg");
        m.textContent = msg;
        t.style.opacity = "1";
        t.style.transform = "translateY(0)";
        t.style.pointerEvents = "auto";
        setTimeout(() => {
          t.style.opacity = "0";
          t.style.transform = "translateY(-8px)";
          t.style.pointerEvents = "none";
        }, 2200);
      }

      function findUsedSchemas() {
        const used = new Set();
        const queue = [
          S.paths,
          S.components.responses || {},
          S.components.parameters || {},
        ];
        const visited = new WeakSet();

        while (queue.length) {
          const node = queue.shift();
          if (!node || typeof node !== "object" || visited.has(node)) continue;
          visited.add(node);

          if (node.$ref) {
            const m = node.$ref.match(/^#\/components\/schemas\/(.+)$/);
            if (m) {
              const name = m[1];
              if (S.components.schemas[name] && !used.has(name)) {
                used.add(name);
                queue.push(S.components.schemas[name]); // Рекурсивный обход вложенных схем
              }
            }
          }

          const vals = Array.isArray(node) ? node : Object.values(node);
          for (const v of vals) if (v && typeof v === "object") queue.push(v);
        }
        return used;
      }
      function deleteSelectedPaths() {
        if (!UI.selectedPaths.size) return;
        if (!confirm(`Удалить ${UI.selectedPaths.size} выбранных путей?`))
          return;
        UI.selectedPaths.forEach((p) => {
          delete S.paths[p];
          if (UI.path === p) {
            UI.path = null;
            UI.method = null;
          }
        });
        UI.selectedPaths.clear();
        render();
      }

      function deleteUnusedSchemas() {
        const used = findUsedSchemas();
        const unused = Object.keys(S.components.schemas).filter(
          (n) => !used.has(n)
        );
        if (!unused.length) return showToast("Нет неиспользуемых схем");
        if (!confirm(`Удалить ${unused.length} неиспользуемых схем?`)) return;
        unused.forEach((n) => {
          delete S.components.schemas[n];
          if (UI.schema === n) UI.schema = null;
        });
        render();
      }

      function togglePathSelect(enc) {
        const p = decodeURIComponent(enc);
        UI.selectedPaths.has(p)
          ? UI.selectedPaths.delete(p)

        renderPaths();
      }

      // ═══════════════════════════════════════════════════════════

      function renderNav() {
        const pathCount = Object.keys(S.paths).length;
        const schemaCount = Object.keys(S.components.schemas).length;

        $("nav-menu").innerHTML = NAV.map(

    ${

    <div class="space-y-2 mt-1">
    ${ks
      .map(

      <div class="flex items-center justify-between mb-2">

        <div><div class="lbl" style="font-size:10px">Enum (через ",")</div><input class="field" style="padding:4px 8px;font-size:12px" value="${esc(

        <div><div class="lbl" style="font-size:10px">Описание</div><input class="field" style="padding:4px 8px;font-size:12px" value="${esc(
          v[k].description || ""
        )}" oninput="S.servers[${si}].variables['${esc(
          k
        )}'].description=this.value;updatePreview()"></div>
      </div>

      .join("")}
    </div></div>`;
      }
      function addServer() {
        S.servers.push({ url: "", description: "", variables: {} });
        render();
      }
      function removeServer(i) {
        S.servers.splice(i, 1);
        render();

      // ═══════════════════════════════════════════════════════════

      function renderTags() {

      // ═══════════════════════════════════════════════════════════

      function renderSecurity() {
        const sc = S.components.securitySchemes;
        const names = Object.keys(sc);
        return `<div class="p-5 fade-in">
    <div class="flex items-center justify-between mb-5">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:#1a0202;border:1px solid #7f1d1d">
          <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        <div><h2 class="font-bold text-white text-base">Безопасность</h2><p class="text-xs" style="color:#3d5068">Схемы аутентификации и глобальные настройки</p></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addSecScheme()">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>Добавить схему
      </button>
    </div>
    <div class="flex gap-4">
      <div class="flex-shrink-0" style="width:200px">
        <div class="text-xs font-semibold uppercase tracking-wider mb-2 px-2" style="color:#2a4a6e">Схемы</div>
        ${names
          .map(
            (n) => `<div class="path-item mb-1 ${
              UI.secScheme === n ? "active" : ""
            }" onclick="UI.secScheme='${esc(n)}';render()">
          <span class="text-xs" style="color:#2a4a6e">🔐</span>
          <div class="min-w-0"><div class="text-sm truncate ${
            UI.secScheme === n ? "text-blue-300" : "text-slate-400"
          }">${esc(n)}</div>
          <div class="text-xs" style="color:#2a4a6e">${
            sc[n].type || "?"
          }</div></div>
        </div>`
          )
          .join("")}
        ${
          names.length === 0
            ? '<div class="text-xs px-2" style="color:#2a4a6e">Нет схем</div>'
            : ""
        }
        <div class="mt-4 px-2">
          <div class="text-xs font-semibold uppercase tracking-wider mb-2" style="color:#2a4a6e">Глобальная защита ${tip(
            "Применяется ко всем операциям по умолчанию. Операции могут переопределить."
          )}</div>
          ${names
            .map(
              (
                n
              ) => `<label class="flex items-center gap-2 mb-1 cursor-pointer">
            <input type="checkbox" class="w-3 h-3 cursor-pointer" ${
              (S.security || []).some((x) => x[n] !== undefined)
                ? "checked"
                : ""
            } onchange="toggleGlobalSec('${esc(n)}',this.checked)">
            <span class="text-xs" style="color:#5a7090">${esc(n)}</span>
          </label>`
            )
            .join("")}
        </div>
      </div>
      <div class="flex-1">
        ${
          UI.secScheme && sc[UI.secScheme]
            ? renderSecEditor(UI.secScheme, sc[UI.secScheme])
            : `<div class="flex flex-col items-center justify-center h-full py-16" style="color:#2a4a6e">
          <svg class="w-12 h-12 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          <p class="text-sm">Выберите схему или создайте новую</p>
        </div>`

      </div>
    </div>
  </div>`;
      }
      function renderSecEditor(name, sc) {
        const typeOpts = [
          ["apiKey", "API Key"],
          ["http", "HTTP (Basic/Bearer)"],
          ["oauth2", "OAuth 2.0"],
          ["openIdConnect", "OpenID Connect"],
          ["mutualTLS", "Mutual TLS"],
        ];
        return `<div class="card fade-in">
    <div class="flex items-center justify-between mb-4">
      <span class="text-white font-bold">${esc(name)}</span>
      <button class="btn btn-danger btn-xs" onclick="removeSecScheme('${esc(
        name
      )}')">Удалить</button>
    </div>
    ${fld(
      "Тип",
      true,
      `<select class="field" onchange="S.components.securitySchemes['${esc(
        name
      )}'].type=this.value;render()">${typeOpts
        .map(
          ([v, l]) =>
            `<option value="${v}" ${
              sc.type === v ? "selected" : ""
            }>${l}</option>`
        )
        .join("")}</select>`,
      "",
      "apiKey — ключ в заголовке/query/cookie; http — Basic или Bearer токен; oauth2 — полноценный OAuth 2.0; openIdConnect — OIDC discovery"
    )}
    ${fld(
      "Описание",
      false,
      `<textarea class="field" rows="2" oninput="S.components.securitySchemes['${esc(
        name
      )}'].description=this.value;updatePreview()">${esc(
        sc.description || ""
      )}</textarea>`,
      "Поясняет пользователям как получить и использовать учётные данные"
    )}
    ${
      sc.type === "apiKey"
        ? `
      ${fld(
        "Имя параметра",
        true,
        `<input class="field" value="${esc(
          sc.name || ""
        )}" placeholder="X-API-Key" oninput="S.components.securitySchemes['${esc(
          name
        )}'].name=this.value;updatePreview()">`,
        "",
        "Имя заголовка, query-параметра или куки. Например: X-API-Key, api_key, Authorization"
      )}
      ${fld(
        "Расположение",
        true,
        `<select class="field" onchange="S.components.securitySchemes['${esc(
          name
        )}'].in=this.value;updatePreview()">
        ${["header", "query", "cookie"]
          .map(
            (v) =>
              `<option value="${v}" ${
                sc.in === v ? "selected" : ""
              }>${v}</option>`
          )
          .join("")}
      </select>`,
        "",
        "header — в HTTP заголовке; query — в параметре URL (?api_key=...); cookie — в куки"
      )}
    `
        : ""
    }
    ${
      sc.type === "http"
        ? `
      ${fld(
        "HTTP схема",
        true,
        `<select class="field" onchange="S.components.securitySchemes['${esc(
          name
        )}'].scheme=this.value;render()">
        ${["bearer", "basic", "digest", "negotiate"]
          .map(
            (v) =>
              `<option value="${v}" ${
                sc.scheme === v ? "selected" : ""
              }>${v}</option>`
          )
          .join("")}
      </select>`,
        "bearer — Authorization: Bearer <token>; basic — Base64(user:pass); digest — Digest Auth"
      )}
      ${
        sc.scheme === "bearer"
          ? fld(
              "Bearer Format",
              false,
              `<input class="field" value="${esc(
                sc.bearerFormat || ""
              )}" placeholder="JWT" oninput="S.components.securitySchemes['${esc(
                name
              )}'].bearerFormat=this.value;updatePreview()">`,
              "Информационное поле для документации. Не влияет на валидацию.",
              "Примеры: JWT, opaque, PASETO"
            )
          : ""
      }
    `
        : ""
    }
    ${
      sc.type === "openIdConnect"
        ? fld(
            "OpenID Connect URL",
            true,
            `<input type="url" class="field" value="${esc(
              sc.openIdConnectUrl || ""
            )}" placeholder="https://example.com/.well-known/openid-configuration" oninput="S.components.securitySchemes['${esc(
              name
            )}'].openIdConnectUrl=this.value;updatePreview()">`,
            "",
            "URL discovery-документа OpenID Connect (openid-configuration endpoint)"
          )
        : ""
    }
    ${sc.type === "oauth2" ? renderOAuth2(name, sc) : ""}
  </div>`;
      }
      function renderOAuth2(name, sc) {
        const flows = sc.flows || {};
        const FT = [
          ["implicit", "Implicit (User redirect)"],
          ["authorizationCode", "Authorization Code"],
          ["clientCredentials", "Client Credentials"],
          ["password", "Password (Resource Owner)"],
        ];
        return `<div class="mb-2">${lbl(
          "OAuth2 Flows",
          false,
          "Выберите один или несколько OAuth2 flow. authorizationCode — наиболее безопасный для веб-приложений. clientCredentials — для server-to-server. implicit — устаревший, не рекомендуется."
        )}
  ${FT.map(([fk, fl]) => {
    const f = flows[fk];
    return `<div class="accordion mb-2">
    <div class="accordion-hdr" style="padding:8px 12px">
      <div class="flex items-center gap-2">
        <input type="checkbox" class="w-3 h-3 cursor-pointer" ${
          f ? "checked" : ""
        } onchange="toggleOauthFlow('${esc(
      name
    )}','${fk}',this.checked)" onclick="event.stopPropagation()">
        <span class="text-xs font-semibold" style="color:#94a3b8">${fl}</span>
      </div>
      ${
        f
          ? `<svg class="acc-arrow w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#3d5068"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`
          : ""
      }
    </div>
    ${
      f
        ? `<div class="accordion-body">
      ${
        fk !== "clientCredentials" && fk !== "password"
          ? `<div class="mb-3">${lbl("Authorization URL", true)}
        <input class="field" value="${esc(
          f.authorizationUrl || ""
        )}" placeholder="https://auth.example.com/authorize" oninput="S.components.securitySchemes['${esc(
              name
            )}'].flows['${fk}'].authorizationUrl=this.value;updatePreview()"></div>`
          : ""
      }
      ${
        fk !== "implicit"
          ? `<div class="mb-3">${lbl("Token URL", true)}
        <input class="field" value="${esc(
          f.tokenUrl || ""
        )}" placeholder="https://auth.example.com/token" oninput="S.components.securitySchemes['${esc(
              name
            )}'].flows['${fk}'].tokenUrl=this.value;updatePreview()"></div>`
          : ""
      }
      <div class="mb-3">${lbl(
        "Refresh URL",
        false,
        "Необязательный URL для обновления токена"
      )}
        <input class="field" value="${esc(
          f.refreshUrl || ""
        )}" placeholder="https://auth.example.com/refresh" oninput="S.components.securitySchemes['${esc(
            name
          )}'].flows['${fk}'].refreshUrl=this.value;updatePreview()"></div>
      <div class="flex items-center justify-between mb-2">${lbl(
        "Scopes",
        true,
        "Разрешения OAuth2. Формат: name — описание. Например: read:users — Чтение данных пользователей"
      )}
        <button class="btn btn-secondary btn-xs" onclick="addOauthScope('${esc(
          name
        )}','${fk}')">+ Scope</button></div>
      ${Object.entries(f.scopes || {})
        .map(
          ([k, v]) => `<div class="flex gap-2 mb-1">
        <input class="field flex-1" style="padding:4px 8px;font-size:11px;font-family:monospace" value="${esc(
          k
        )}" placeholder="read:users" onblur="renameScope('${esc(
            name
          )}','${fk}','${esc(k)}',this.value)">
        <input class="field flex-1" style="padding:4px 8px;font-size:11px" value="${esc(
          v
        )}" placeholder="Описание" oninput="S.components.securitySchemes['${esc(
            name
          )}'].flows['${fk}'].scopes['${esc(k)}']=this.value;updatePreview()">
        <button class="btn btn-danger btn-xs" onclick="removeScope('${esc(
          name
        )}','${fk}','${esc(k)}')">×</button>
      </div>`
        )
        .join("")}
    </div>`
        : ""
    }
  </div>`;
  }).join("")}</div>`;
      }
      function addSecScheme() {
        const n = prompt("Имя схемы (напр. BearerAuth, ApiKey, OAuth2):");
        if (!n) return;
        S.components.securitySchemes[n] = {
          type: "http",
          scheme: "bearer",
          bearerFormat: "JWT",
          description: "",
        };
        UI.secScheme = n;
        render();
      }
      function removeSecScheme(n) {
        if (!confirm(`Удалить схему "${n}"?`)) return;
        delete S.components.securitySchemes[n];
        if (UI.secScheme === n) UI.secScheme = null;
        render();
      }
      function toggleGlobalSec(n, on) {
        if (!S.security) S.security = [];
        if (on) {
          if (!S.security.some((x) => x[n] !== undefined))
            S.security.push({ [n]: [] });
        } else {
          S.security = S.security.filter((x) => x[n] === undefined);
        }
        updatePreview();
      }
      function toggleOauthFlow(name, fk, on) {
        if (!S.components.securitySchemes[name].flows)
          S.components.securitySchemes[name].flows = {};
        if (on) S.components.securitySchemes[name].flows[fk] = { scopes: {} };
        else delete S.components.securitySchemes[name].flows[fk];
        render();
      }
      function addOauthScope(name, fk) {
        const k = prompt("Имя scope (напр. read:users):");
        if (!k) return;
        S.components.securitySchemes[name].flows[fk].scopes[k] = "";
        render();
      }
      function removeScope(name, fk, k) {
        delete S.components.securitySchemes[name].flows[fk].scopes[k];
        render();
      }
      function renameScope(name, fk, old, nw) {
        if (old === nw || !nw) return;
        const s = S.components.securitySchemes[name].flows[fk].scopes;
        s[nw] = s[old];
        delete s[old];
        render();
      }

      // ═══════════════════════════════════════════════════════════
      // PATHS
      // ═══════════════════════════════════════════════════════════
      function renderPaths() {
        const paths = S.paths;
        const pk = Object.keys(paths);
        return `<div class="flex h-full">
<div class="flex-shrink-0 flex flex-col" style="width:230px;background:#060e1c;border-right:1px solid #1a2640">

  </div>
  ${
    UI.selectedPaths.size > 0
      ? `<div class="px-2 py-1.5 flex-shrink-0" style="background:#1a0202;border-bottom:1px solid #331111">

      : ""
  }
  <div class="flex-1 overflow-y-auto p-2">
  ${

      : pk
          .map((p) => {
            const ms = METHODS.filter((m) => paths[p][m]);

            return `<div class="path-item group ${
              UI.path === p ? "active" : ""
            }" onclick="selectPath('${encodeURIComponent(p)}')">
      <input type="checkbox" class="w-3 h-3 mr-2 cursor-pointer flex-shrink-0 mt-1" ${
        sel ? "checked" : ""

<div class="flex-1 overflow-y-auto">

</div>`;

      function renderPathEditor(pk, pObj) {

              : ""

      }).join("")}

    }

              pk

                  pk

      function renderParams(pk, m, params) {
        if (!params.length)
          return '<div class="text-xs" style="color:#2a4a6e">Нет параметров</div>';

          .map((p, i) => renderParamCard(pk, m, p, i))
          .join("")}</div>`;
      }

      function renderParamCard(pk, m, p, i) {
        const tp = p.schema?.type || "string";
        const fmts = {
          string: STRING_FORMATS,
          integer: NUM_FORMATS,
          number: NUM_FORMATS,
        };
        const fmt = fmts[tp] || [""];
        return `<div class="card-dark">
    <div class="flex items-center justify-between mb-2">

        <span class="text-xs font-mono text-yellow-300">${esc(
          p.name || "?"

          p.in || "query"
        }</span>
        ${
          p.required
            ? '<span class="text-xs px-1.5 rounded" style="background:#1a0202;color:#f87171">required</span>'
            : ""

        "path — часть URL /users/{id}; query — ?filter=; header — HTTP заголовок; cookie — куки"

          pk
        )}']['${m}'].parameters[${i}].schema={};S.paths['${esc(
          pk
        )}']['${m}'].parameters[${i}].schema.type=this.value;render()">
          ${SCHEMA_TYPES.map(

          pk

          pk
        )}']['${m}'].parameters[${i}].schema={};S.paths['${esc(
          pk

    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2">

      <div><div class="lbl" style="font-size:10px">Пример ${tip(

        <select class="field" style="padding:4px 8px;font-size:12px" onchange="if(!S.paths['${esc(
          pk
        )}']['${m}'].parameters[${i}].schema.items)S.paths['${esc(
            pk

            pk

          pk

        p.schema?.type === "object" || p.schema?.type === "array"

        return `<div>
    <div class="flex items-center justify-between mb-3">

        !!rb.required,
        "Обязательное тело запроса",
        `S.paths['${esc(
          pk
        )}']['${m}'].requestBody.required=this.checked;updatePreview()`,
        "Если true, клиент обязан передать тело запроса"

      `<input class="field" value="${esc(
        rb.description || ""
      )}" placeholder="Данные для создания ресурса" oninput="S.paths['${esc(
        pk
      )}']['${m}'].requestBody.description=this.value;updatePreview()">`,
      ""
    )}
    <div class="flex items-center justify-between mb-2">
      ${lbl(
        "Content Types",
        "",
        "Форматы тела запроса. application/json — наиболее распространённый. multipart/form-data — для загрузки файлов."
      )}
      <select class="field" style="width:auto;padding:4px 8px;font-size:12px" onchange="addCT('${encodeURIComponent(
        pk
      )}','${m}','req',this.value);this.selectedIndex=0">
        <option value="">+ Content-Type</option>${CONTENT_TYPES.map(
          (ct) => `<option value="${ct}">${ct}</option>`
        ).join("")}
      </select>
    </div>
    ${Object.entries(rb.content || {})
      .map(([ct, ctv]) => renderCT(pk, m, "req", ct, ctv))
      .join("")}
  </div>`;
      }

      function renderResponses(pk, m, resps) {
        if (!Object.keys(resps).length)
          return '<div class="text-xs" style="color:#2a4a6e">Нет ответов. Добавьте минимум один.</div>';
        return `<div class="space-y-2">${Object.entries(resps)
          .map(([code, r]) => {
            const n = parseInt(code);
            const cls =
              n >= 500
                ? "st-5xx"
                : n >= 400
                ? "st-4xx"
                : n >= 300
                ? "st-3xx"
                : "st-2xx";
            return `<div class="card-dark">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="status-badge ${cls}">${esc(code)}</span>
          <span class="text-xs" style="color:#3d5068">${
            HTTP_STATUS[code] || ""
          }</span>
        </div>
        <button class="btn btn-danger btn-xs" onclick="delete S.paths['${esc(
          pk
        )}']['${m}'].responses['${code}'];render()">×</button>
      </div>
      <div class="mb-2"><div class="lbl" style="font-size:10px">Описание <span class="req">*</span> ${tip(
        "Обязательное поле. Краткое описание ответа."
      )}</div>
        <input class="field" style="padding:4px 8px;font-size:12px" value="${esc(
          r.description || ""
        )}" placeholder="${
              HTTP_STATUS[code] || "Описание ответа"
            }" oninput="S.paths['${esc(
              pk
            )}']['${m}'].responses['${code}'].description=this.value;updatePreview()"></div>
      <div class="flex items-center justify-between mb-1.5">
        ${lbl(
          "Content",
          "",
          "Тело ответа с форматами. Не требуется для 204 No Content."
        )}
        <select class="field" style="width:auto;padding:3px 6px;font-size:11px" onchange="addCT('${encodeURIComponent(
          pk
        )}','${m}','resp_${code}',this.value);this.selectedIndex=0">
          <option value="">+ Content-Type</option>${CONTENT_TYPES.map(
            (ct) => `<option value="${ct}">${ct}</option>`
          ).join("")}
        </select>
      </div>
      ${Object.entries(r.content || {})
        .map(([ct, ctv]) => renderCT(pk, m, "resp_" + code, ct, ctv))
        .join("")}
      ${renderRespHeaders(pk, m, code, r.headers || {})}
    </div>`;
          })
          .join("")}</div>`;
      }

      function renderRespHeaders(pk, m, code, hdrs) {
        const ks = Object.keys(hdrs);
        return `<div class="mt-2">
    <div class="flex items-center justify-between mb-1">
      ${lbl(
        "Заголовки ответа",
        "",
        "HTTP заголовки в ответе. Например: X-Rate-Limit, X-Request-Id, Location, ETag."
      )}
      <button class="btn btn-secondary btn-xs" onclick="addRespHdr('${encodeURIComponent(
        pk
      )}','${m}','${code}')">+ Header</button>
    </div>
    ${ks
      .map(
        (h) => `<div class="flex gap-1.5 mb-1">
      <span class="text-xs font-mono px-2 py-1 rounded flex-shrink-0" style="background:#091220;color:#60a5fa;border:1px solid #1e293b">${esc(
        h
      )}</span>
      <input class="field flex-1" style="padding:4px 8px;font-size:11px" value="${esc(
        hdrs[h].description || ""
      )}" placeholder="Описание заголовка" oninput="S.paths['${esc(
          pk
        )}']['${m}'].responses['${code}'].headers['${h}'].description=this.value;updatePreview()">
      <button class="btn btn-danger btn-xs" onclick="delete S.paths['${esc(
        pk
      )}']['${m}'].responses['${code}'].headers['${h}'];render()">×</button>
    </div>`
      )
      .join("")}
  </div>`;
      }

      function renderCT(pk, m, target, ct, ctv) {
        const schema = ctv.schema || {};
        const srefs = Object.keys(S.components.schemas);
        return `<div class="mb-2 p-2.5 rounded-lg" style="background:#040b15;border:1px solid #1a2640">
    <div class="flex items-center justify-between mb-2">
      <span class="text-xs font-mono text-green-400">${esc(ct)}</span>
      <button class="btn btn-danger btn-xs" onclick="removeCT('${encodeURIComponent(
        pk
      )}','${m}','${esc(target)}','${esc(ct)}')">×</button>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-2">
      <div><div class="lbl" style="font-size:10px">Ссылка на схему ($ref) ${tip(
        'Ссылается на компонент из раздела "Схемы". Предпочтительно для повторно используемых схем.'
      )}</div>
        <select class="field" style="padding:4px 8px;font-size:12px" onchange="setCTRef('${encodeURIComponent(
          pk
        )}','${m}','${esc(target)}','${esc(ct)}',this.value)">
          <option value="">Inline</option>${srefs
            .map(
              (r) =>
                `<option value="#/components/schemas/${r}" ${
                  schema.$ref === "#/components/schemas/" + r ? "selected" : ""
                }>→ ${r}</option>`
            )
            .join("")}
        </select></div>
      ${
        !schema.$ref
          ? `<div><div class="lbl" style="font-size:10px">Тип (inline)</div>
        <select class="field" style="padding:4px 8px;font-size:12px" onchange="setCTInlineType('${encodeURIComponent(
          pk
        )}','${m}','${esc(target)}','${esc(ct)}',this.value)">
          ${SCHEMA_TYPES.map(
            (t) =>
              `<option value="${t}" ${
                schema.type === t ? "selected" : ""
              }>${t}</option>`
          ).join("")}
        </select></div>`
          : `<div class="flex items-center"><span class="text-xs text-blue-400 font-mono px-2 py-1 rounded w-full truncate" style="background:#0a1628;border:1px solid #1e293b">→ ${esc(
              schema.$ref?.split("/").pop() || ""
            )}</span></div>`
      }
    </div>
    <div><div class="lbl" style="font-size:10px">Пример ${tip(
      "JSON пример для документации. Должен соответствовать схеме."
    )}</div>
      <textarea class="field field-mono" rows="2" style="padding:4px 8px;font-size:11px" placeholder='{"id":"123","name":"John"}' oninput="setCTExample('${encodeURIComponent(
        pk
      )}','${m}','${esc(target)}','${esc(ct)}',this.value)">${esc(
          ctv.example ? JSON.stringify(ctv.example, null, 2) : ""
        )}</textarea></div>
  </div>`;
      }

      function renderOpSecurity(pk, m, op) {
        const sc = Object.keys(S.components.securitySchemes);
        const ov = op.security !== undefined;
        return `<div>
    ${chk(
      ov,
      "Переопределить глобальную безопасность",
      `toggleOpSecOverride('${esc(pk)}','${m}',this.checked)`,
      "Отключите чтобы наследовать глобальные настройки. Включите для индивидуальной конфигурации или публичного доступа."
    )}
    ${
      ov
        ? `<div class="mt-3 space-y-1">
      ${
        sc.length === 0
          ? '<div class="text-xs" style="color:#2a4a6e">Определите схемы в разделе Безопасность</div>'
          : sc
              .map(
                (n) => `<label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" class="w-3 h-3 cursor-pointer" ${
          (op.security || []).some((x) => x[n] !== undefined) ? "checked" : ""
        } onchange="toggleOpSec('${esc(pk)}','${m}','${esc(n)}',this.checked)">
        <span class="text-xs" style="color:#7c8fa8">${esc(n)}</span>
        <span class="text-xs" style="color:#2a4a6e">(${
          S.components.securitySchemes[n].type
        })</span>
      </label>`
              )
              .join("")
      }
      <label class="flex items-center gap-2 cursor-pointer mt-2">
        <input type="checkbox" class="w-3 h-3 cursor-pointer" ${
          (op.security || []).some((x) => Object.keys(x).length === 0)
            ? "checked"
            : ""
        } onchange="toggleOpSecPublic('${esc(pk)}','${m}',this.checked)">
        <span class="text-xs text-red-400">🔓 Публичный доступ (без аутентификации)</span>
      </label>
    </div>`
        : '<div class="text-xs mt-2" style="color:#2a4a6e">Используется глобальная конфигурация безопасности</div>'
    }
  </div>`;
      }

      // Paths mutations
      function addPath() {
        const p = prompt("Путь (начинается с /):", "/");
        if (!p) return;
        const np = p.startsWith("/") ? p : "/" + p;
        if (S.paths[np]) {
          alert("Путь уже существует");
          return;
        }
        S.paths[np] = {};
        UI.path = np;
        UI.method = null;
        render();
      }
      function removePath(enc) {
        const p = decodeURIComponent(enc);
        if (!confirm(`Удалить путь "${p}"?`)) return;
        delete S.paths[p];
        if (UI.path === p) {
          UI.path = null;
          UI.method = null;
        }
        render();
      }
      function selectPath(enc) {
        const p = decodeURIComponent(enc);
        UI.path = p;
        const ms = METHODS.filter((m) => S.paths[p] && S.paths[p][m]);
        UI.method = ms[0] || null;
        render();
      }
      function renamePath(enc, np) {
        const op = decodeURIComponent(enc);
        if (!np || op === np) return;
        if (S.paths[np]) {
          alert("Путь уже существует");
          const el = document.querySelector("input[value]");
          if (el) el.value = op.replace(/^\//, "");
          return;
        }
        S.paths[np] = S.paths[op];
        delete S.paths[op];
        UI.path = np;
        render();
      }
      function addMethod(enc, m) {
        const p = decodeURIComponent(enc);
        if (!S.paths[p]) S.paths[p] = {};
        S.paths[p][m] = {
          summary: "",
          description: "",
          operationId: "",
          tags: [],
          parameters: [],
          responses: { 200: { description: "OK", content: {} } },
        };
        if (["post", "put", "patch"].includes(m))
          S.paths[p][m].requestBody = {
            required: true,
            description: "",
            content: { "application/json": { schema: { type: "object" } } },
          };
        UI.method = m;
        render();
      }
      function removeMethod(enc, m) {
        const p = decodeURIComponent(enc);
        if (!confirm(`Удалить ${m.toUpperCase()}?`)) return;
        delete S.paths[p][m];
        const ms = METHODS.filter((x) => S.paths[p][x]);
        UI.method = ms[0] || null;
        render();
      }
      function selectMethod(m) {
        UI.method = m;
        render();
      }
      function addParam(enc, m) {
        const p = decodeURIComponent(enc);
        const op = S.paths[p][m];
        if (!op.parameters) op.parameters = [];
        op.parameters.push({
          name: "param" + (op.parameters.length + 1),
          in: "query",
          description: "",
          required: false,
          schema: { type: "string" },
        });
        render();
      }
      function addPathParam(enc) {
        const p = decodeURIComponent(enc);
        const n = prompt("Имя path-параметра:");
        if (!n) return;
        if (!S.paths[p].parameters) S.paths[p].parameters = [];
        S.paths[p].parameters.push({
          name: n,
          in: "path",
          required: true,
          description: "",
          schema: { type: "string" },
        });
        render();
      }
      function addResponse(enc, m) {
        const p = decodeURIComponent(enc);
        const c = prompt("HTTP код (200,400,404,default...):");
        if (!c) return;
        if (!S.paths[p][m].responses) S.paths[p][m].responses = {};
        S.paths[p][m].responses[c] = {
          description: HTTP_STATUS[c] || "",
          content: {},
        };
        render();
      }
      function addRespHdr(enc, m, code) {
        const p = decodeURIComponent(enc);
        const n = prompt("Имя заголовка (напр. X-Rate-Limit):");
        if (!n) return;
        if (!S.paths[p][m].responses[code].headers)
          S.paths[p][m].responses[code].headers = {};
        S.paths[p][m].responses[code].headers[n] = {
          schema: { type: "string" },
          description: "",
        };
        render();
      }
      function toggleOpTag(pk, m, t) {
        const op = S.paths[pk][m];
        if (!op.tags) op.tags = [];
        const i = op.tags.indexOf(t);
        if (i >= 0) op.tags.splice(i, 1);
        else op.tags.push(t);
        render();
      }
      function toggleOpSecOverride(pk, m, on) {
        if (on) S.paths[pk][m].security = [];
        else delete S.paths[pk][m].security;
        render();
      }
      function toggleOpSec(pk, m, n, on) {
        const op = S.paths[pk][m];
        if (!op.security) op.security = [];
        if (on) {
          if (!op.security.some((x) => x[n] !== undefined))
            op.security.push({ [n]: [] });
        } else op.security = op.security.filter((x) => x[n] === undefined);
        updatePreview();
      }
      function toggleOpSecPublic(pk, m, on) {
        const op = S.paths[pk][m];
        if (!op.security) op.security = [];
        if (on) {
          if (!op.security.some((x) => Object.keys(x).length === 0))
            op.security.push({});
        } else
          op.security = op.security.filter((x) => Object.keys(x).length > 0);
        updatePreview();
      }
      function addCT(enc, m, target, ct) {
        if (!ct) return;
        const p = decodeURIComponent(enc);
        const obj = { schema: { type: "object" } };
        if (target === "req") {
          if (!S.paths[p][m].requestBody.content)
            S.paths[p][m].requestBody.content = {};
          S.paths[p][m].requestBody.content[ct] = obj;
        } else {
          const code = target.replace("resp_", "");
          if (!S.paths[p][m].responses[code].content)
            S.paths[p][m].responses[code].content = {};
          S.paths[p][m].responses[code].content[ct] = obj;
        }
        render();
      }
      function removeCT(enc, m, target, ct) {
        const p = decodeURIComponent(enc);
        if (target === "req") delete S.paths[p][m].requestBody.content[ct];
        else {
          const code = target.replace("resp_", "");
          delete S.paths[p][m].responses[code].content[ct];
        }
        render();
      }
      function getCTContent(p, m, target, ct) {
        if (target === "req") return S.paths[p][m].requestBody.content[ct];
        const code = target.replace("resp_", "");
        return S.paths[p][m].responses[code].content[ct];
      }
      function setCTRef(enc, m, target, ct, ref) {
        const p = decodeURIComponent(enc);
        const c = getCTContent(p, m, target, ct);
        if (ref) c.schema = { $ref: ref };
        else c.schema = { type: "object" };
        render();
      }
      function setCTInlineType(enc, m, target, ct, type) {
        const p = decodeURIComponent(enc);
        const c = getCTContent(p, m, target, ct);
        c.schema = { type };
        updatePreview();
      }
      function setCTExample(enc, m, target, ct, val) {
        const p = decodeURIComponent(enc);
        const c = getCTContent(p, m, target, ct);
        try {
          c.example = JSON.parse(val);
        } catch {
          c.example = val;
        }
        updatePreview();
      }

      // ═══════════════════════════════════════════════════════════
      // SCHEMAS
      // ═══════════════════════════════════════════════════════════
      function renderSchemas() {
        const sc = S.components.schemas;
        const names = Object.keys(sc);
        const used = findUsedSchemas();
        const unused = names.filter((n) => !used.has(n));
        return `<div class="flex h-full">
  <div class="flex-shrink-0 flex flex-col" style="width:230px;background:#060e1c;border-right:1px solid #1a2640">
    <div class="flex items-center justify-between px-3 py-2.5" style="border-bottom:1px solid #1a2640">
      <span class="text-xs font-semibold uppercase tracking-wider" style="color:#2a4a6e">Схемы (${
        names.length
      })</span>
      <button class="btn btn-primary btn-xs" onclick="addSchema()">+ Схема</button>
    </div>
    <div class="flex-1 overflow-y-auto p-2">
    ${
      names.length === 0
        ? `<div class="text-center py-8 text-xs" style="color:#2a4a6e"><p class="mb-2">Нет схем</p><button class="btn btn-secondary btn-xs" onclick="addSchema()">Создать схему</button></div>`
        : names
            .map((n) => {
              const u = used.has(n);
              return `<div class="path-item group mb-1 ${
                UI.schema === n ? "active" : ""
              } ${!u ? "opacity-60" : ""}" onclick="UI.schema='${esc(
                n
              )}';render()">
        <div class="flex-1 min-w-0">
          <div class="text-sm truncate ${
            UI.schema === n ? "text-blue-300" : "text-slate-400"
          }">${esc(n)}</div>
          <div class="text-xs" style="color:#2a4a6e">${sc[n].type || "any"}${
                sc[n].properties
                  ? " · " + Object.keys(sc[n].properties).length + " props"
                  : sc[n].items
                  ? " · array"
                  : ""
              }${sc[n].enum ? " · enum" : ""}</div>
        </div>
        <button class="btn btn-ghost opacity-0 group-hover:opacity-100" style="padding:2px 4px;flex-shrink:0" onclick="removeSchema('${esc(
          n
        )}');event.stopPropagation()">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>`;
            })
            .join("")
    }
    ${
      unused.length > 0
        ? `
    <div class="mt-2 px-2 pt-2" style="border-top:1px solid #1a2640">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold uppercase tracking-wider" style="color:#fb923c">Неиспользуемые (${
          unused.length
        })</span>
        <button class="btn btn-danger btn-xs" onclick="deleteUnusedSchemas()">Удалить все</button>
      </div>
      <div class="space-y-1">
      ${unused
        .map(
          (
            n
          ) => `<div class="flex items-center justify-between px-2 py-1 rounded" style="background:#1e1000;border:1px solid #7c3500">
        <span class="text-xs truncate max-w-[140px] text-orange-300">${esc(
          n
        )}</span>
        <button class="btn btn-danger btn-xs" onclick="removeSchema('${esc(
          n
        )}')">×</button>
      </div>`
        )
        .join("")}
      </div>
    </div>`
        : ""
    }
    </div>
  </div>
  <div class="flex-1 overflow-y-auto">
    ${
      UI.schema && sc[UI.schema]
        ? renderSchemaEditor(UI.schema, sc[UI.schema])
        : `<div class="flex flex-col items-center justify-center h-full" style="color:#2a4a6e"><svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/></svg><p>Выберите схему или создайте новую</p></div>`
    }
  </div>
  </div>`;
      }
      function renderSchemaEditor(name, sc) {
        const tp = sc.type || "";
        return `<div class="p-5 fade-in">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <h2 class="text-white font-bold text-base">${esc(name)}</h2>
        <button class="btn btn-secondary btn-xs" onclick="renameSchema('${esc(
          name
        )}')">✏️</button>
      </div>
      <button class="btn btn-danger btn-xs" onclick="removeSchema('${esc(
        name
      )}')">Удалить</button>
    </div>

    <div class="card mb-3">
      <div class="text-sm font-semibold text-white mb-4 flex items-center gap-2"><span class="w-1 h-4 rounded-full inline-block" style="background:#3b82f6"></span>Основные параметры</div>
      <div class="grid grid-cols-2 gap-3">
        <div>${fld(
          "Тип",
          false,
          `<select class="field" onchange="S.components.schemas['${esc(
            name
          )}'].type=this.value;if(this.value==='object'&&!S.components.schemas['${esc(
            name
          )}'].properties)S.components.schemas['${esc(
            name
          )}'].properties={};render()">
          <option value="">— не указан —</option>
          ${SCHEMA_TYPES.map(
            (t) =>
              `<option value="${t}" ${tp === t ? "selected" : ""}>${t}</option>`
          ).join("")}
        </select>`,
          "",
          "string/number/integer/boolean — примитивы. object — объект с полями. array — массив элементов."
        )}</div>
        <div>${fld(
          "Формат",
          false,
          `<input class="field" value="${esc(
            sc.format || ""
          )}" placeholder="date-time, uuid, email..." oninput="S.components.schemas['${esc(
            name
          )}'].format=this.value||undefined;updatePreview()">`,
          "",
          "date, date-time, email, uuid, uri, binary, byte, password, int32, int64, float, double"
        )}</div>
      </div>
      ${fld(
        "Описание",
        false,
        `<textarea class="field" rows="2" placeholder="Описание схемы (поддерживает Markdown)" oninput="S.components.schemas['${esc(
          name
        )}'].description=this.value;updatePreview()">${esc(
          sc.description || ""
        )}</textarea>`,
        ""
      )}
      <div class="grid grid-cols-3 gap-3">
        <div>${lbl(
          "nullable",

      function renderStrSchema(name, sc) {

      function renderComposition(name, sc) {
        const srefs = Object.keys(S.components.schemas).filter(
